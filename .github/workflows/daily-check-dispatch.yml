name: Daily Check Dispatch

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: daily-check-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Call dispatch API
        env:
          DISPATCH_URL: ${{ secrets.DAILY_CHECK_DISPATCH_URL }}
          CRON_TOKEN: ${{ secrets.DAILY_CHECK_CRON_TOKEN }}
        run: |
          if [ -z "$DISPATCH_URL" ] || [ -z "$CRON_TOKEN" ]; then
            echo "Required secrets are missing: DAILY_CHECK_DISPATCH_URL or DAILY_CHECK_CRON_TOKEN"
            exit 1
          fi

          ORIGIN=$(echo "$DISPATCH_URL" | sed -E 's#(https?://[^/]+).*#\1#')
          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "$DISPATCH_URL" \
            -H "Authorization: Bearer $CRON_TOKEN" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Origin: $ORIGIN" \
            --data '{}')

          echo "HTTP status: $HTTP_CODE"
          cat response.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Dispatch call failed"
            exit 1
          fi
